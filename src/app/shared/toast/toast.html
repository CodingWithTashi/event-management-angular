<div class="toast-container">
  @for (toast of toastService.toasts(); track toast.id) {
    <div class="toast" [class.toast-error]="toast.type === 'error'">
      <span>{{ toast.text }}</span>
      <button
        type="button"
        class="toast-close"
        aria-label="Dismiss"
        (click)="toastService.dismiss(toast.id)"
      >
        &times;
      </button>
    </div>
  }
</div>
